<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budapest Stag Do — Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* Hungarian flag inspired + Budapest Belle Époque */
    --paprika:      #C8102E;   /* Hungarian flag red */
    --paprika-deep: #8B0A1E;
    --forest:       #436F4D;   /* Hungarian flag green */
    --forest-deep:  #2A4A30;
    --gold:         #D4A84B;   /* Parliament dome gold */
    --gold-bright:  #F2D27A;
    --gold-deep:    #8B6914;
    --cream:        #F4EBD9;   /* old paper */
    --bone:         #E8DCC0;
    --ink:          #1A0F08;   /* deep coffee-brown */
    --ink-soft:     #2E1F14;
    --burgundy:     #4A0E1F;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--ink);
    overflow-x: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
  }

  /* ─────────────────────────────────────────
     POSTER FRAME
     ───────────────────────────────────────── */
  .poster {
    width: 100vw;
    min-height: 100vh;
    position: relative;
    padding: 50px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 0%,   rgba(200,16,46,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(67,111,77,0.15)  0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%,  rgba(212,168,75,0.10) 0%, transparent 60%),
      linear-gradient(180deg, #1A0F08 0%, #0E0905 50%, #1A0F08 100%);
  }

  /* paper grain */
  .poster::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 220px 220px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }

  /* art deco fan pattern in corners */
  .poster::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0 18px,
        rgba(212,168,75,0.04) 18px 19px);
    pointer-events: none;
    z-index: 1;
  }

  /* ─────────────────────────────────────────
     ORNATE FRAME BORDER
     ───────────────────────────────────────── */
  .frame {
    position: absolute;
    inset: 22px;
    border: 2px solid var(--gold);
    z-index: 2;
    pointer-events: none;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--gold-deep);
  }
  .frame::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px dashed rgba(212,168,75,0.35);
  }

  /* corner flourishes */
  .flourish {
    position: absolute;
    width: 90px; height: 90px;
    z-index: 3;
    color: var(--gold);
    pointer-events: none;
  }
  .flourish svg { width: 100%; height: 100%; }
  .flourish.tl { top: 28px; left: 28px; }
  .flourish.tr { top: 28px; right: 28px; transform: scaleX(-1); }
  .flourish.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
  .flourish.br { bottom: 28px; right: 28px; transform: scale(-1,-1); }

  /* ─────────────────────────────────────────
     CONTENT
     ───────────────────────────────────────── */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }

  /* ── flag stripe banner ── */
  .flag-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    animation: fadeDown 0.9s ease both;
  }
  .flag-stripe {
    display: inline-flex;
    height: 14px;
    width: 60px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.4);
  }
  .flag-stripe span {
    flex: 1;
  }
  .flag-stripe span:nth-child(1) { background: var(--paprika); }
  .flag-stripe span:nth-child(2) { background: var(--cream); }
  .flag-stripe span:nth-child(3) { background: var(--forest); }

  .flag-emoji {
    font-size: 24px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }

  /* ── eyebrow ── */
  .eyebrow {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(10px, 1.5vmin, 13px);
    letter-spacing: 0.7em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
    padding-left: 0.7em;
    animation: fadeDown 0.9s 0.1s ease both;
  }

  .eyebrow-script {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(14px, 2.2vmin, 19px);
    color: var(--bone);
    margin-bottom: 18px;
    opacity: 0.85;
    animation: fadeDown 0.9s 0.15s ease both;
  }
  .eyebrow-script::before,
  .eyebrow-script::after {
    content: '✦';
    color: var(--gold);
    margin: 0 14px;
    font-size: 0.7em;
    vertical-align: middle;
    opacity: 0.7;
  }

  /* ── BUDAPEST title ── */
  .city {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(70px, 14vmin, 160px);
    line-height: 0.9;
    letter-spacing: 0.05em;
    color: var(--gold-bright);
    text-shadow:
      0 0 1px var(--gold),
      0 0 30px rgba(212,168,75,0.4),
      0 4px 0 var(--gold-deep),
      0 6px 30px rgba(0,0,0,0.8);
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeDown 0.9s 0.2s ease both;
    position: relative;
  }

  /* ── beer + stag do row ── */
  .stag-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 3vmin, 28px);
    margin-top: 8px;
    margin-bottom: 22px;
    animation: fadeDown 0.9s 0.3s ease both;
  }
  .beer {
    font-size: clamp(28px, 6vmin, 48px);
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
    display: inline-block;
    transform-origin: bottom center;
  }
  .beer.left  { animation: clinkLeft  2.4s ease-in-out infinite; }
  .beer.right { animation: clinkRight 2.4s ease-in-out infinite; }

  .stag-do {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(26px, 5vmin, 52px);
    color: var(--cream);
    letter-spacing: 0.3em;
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    padding-left: 0.3em; /* optical centering for letterspacing */
  }

  /* ── ornament divider ── */
  .ornament {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    color: var(--gold);
    animation: scaleIn 0.7s 0.45s ease both;
  }
  .ornament .line {
    height: 1px;
    width: clamp(60px, 14vmin, 130px);
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  }
  .ornament .diamond {
    color: var(--paprika);
    font-size: 14px;
    text-shadow: 0 0 12px rgba(200,16,46,0.6);
  }
  .ornament .diamond.gold { color: var(--gold); text-shadow: 0 0 12px rgba(212,168,75,0.6); }

  /* ── countdown ── */
  .countdown-label {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(10px, 1.6vmin, 14px);
    letter-spacing: 0.6em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 0.6em;
    animation: fadeUp 0.9s 0.55s ease both;
  }

  .countdown {
    display: flex;
    gap: clamp(8px, 2vmin, 18px);
    align-items: stretch;
    margin-bottom: 28px;
    animation: fadeUp 0.9s 0.65s ease both;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(14px, 2.5vmin, 22px) clamp(12px, 2.5vmin, 22px);
    min-width: clamp(78px, 14vmin, 130px);
    background:
      linear-gradient(180deg,
        rgba(74,14,31,0.55) 0%,
        rgba(26,15,8,0.7)  100%);
    border: 1px solid var(--gold-deep);
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(212,168,75,0.25),
      inset 0 -1px 0 rgba(0,0,0,0.5),
      0 8px 30px rgba(0,0,0,0.6);
  }
  /* tiny corner notches like a ticket */
  .unit::before, .unit::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--gold);
    border-style: solid;
    border-width: 0;
  }
  .unit::before {
    top: 4px; left: 4px;
    border-top-width: 1px; border-left-width: 1px;
  }
  .unit::after {
    bottom: 4px; right: 4px;
    border-bottom-width: 1px; border-right-width: 1px;
  }

  .unit-num {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(38px, 8.5vmin, 88px);
    line-height: 1;
    color: var(--gold-bright);
    text-shadow:
      0 0 20px rgba(242,210,122,0.45),
      0 2px 0 var(--gold-deep);
    font-variant-numeric: tabular-nums;
    display: inline-block;
  }
  .unit-num.tick {
    animation: flip 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  .unit-label {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(9px, 1.3vmin, 11px);
    letter-spacing: 0.35em;
    color: var(--bone);
    text-transform: uppercase;
    margin-top: 10px;
    padding-left: 0.35em;
    opacity: 0.85;
  }

  /* ── date pill ── */
  .date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
    animation: fadeUp 0.9s 0.8s ease both;
  }
  .date-pill {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(15px, 2.6vmin, 22px);
    letter-spacing: 0.04em;
    color: var(--cream);
    padding: 10px 32px;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    position: relative;
  }
  .date-pill::before, .date-pill::after {
    content: '❦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--paprika);
    font-size: 12px;
    text-shadow: 0 0 8px rgba(200,16,46,0.5);
  }
  .date-pill::before { left: 10px; }
  .date-pill::after  { right: 10px; }

  .date-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(9px, 1.4vmin, 12px);
    letter-spacing: 0.5em;
    color: var(--gold);
    margin-top: 8px;
    padding-left: 0.5em;
    text-transform: uppercase;
  }

  /* ── tagline ── */
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(13px, 2vmin, 17px);
    color: var(--bone);
    letter-spacing: 0.06em;
    animation: fadeUp 0.9s 0.9s ease both;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
  }
  .tagline .dot {
    color: var(--gold);
    font-size: 0.7em;
  }
  .tagline .stamp {
    font-family: 'Cinzel', serif;
    font-style: normal;
    font-weight: 800;
    color: var(--paprika);
    letter-spacing: 0.25em;
    border: 1.5px solid var(--paprika);
    padding: 4px 10px 3px;
    text-transform: uppercase;
    font-size: 0.78em;
    transform: rotate(-3deg);
    display: inline-block;
    text-shadow: 0 0 14px rgba(200,16,46,0.4);
    box-shadow: inset 0 0 0 3px var(--ink), 0 0 0 1px var(--paprika);
  }

  /* floating beer mugs scattered */
  .scattered-beer {
    position: absolute;
    z-index: 2;
    font-size: clamp(20px, 3.5vmin, 32px);
    opacity: 0.5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    pointer-events: none;
  }
  .sb-1 { top: 12%;  left: 6%;  animation: float 6s ease-in-out infinite; }
  .sb-2 { top: 22%;  right: 7%; animation: float 6s 1.5s ease-in-out infinite; }
  .sb-3 { bottom: 14%; left: 8%; animation: float 6s 3s ease-in-out infinite; }
  .sb-4 { bottom: 20%; right: 6%; animation: float 6s 4.5s ease-in-out infinite; }

  /* scattered flag emojis */
  .scattered-flag {
    position: absolute;
    z-index: 2;
    font-size: clamp(16px, 2.5vmin, 22px);
    opacity: 0.45;
    pointer-events: none;
  }
  .sf-1 { top: 18%;  left: 12%; transform: rotate(-12deg); }
  .sf-2 { top: 30%;  right: 14%; transform: rotate(8deg); }
  .sf-3 { bottom: 22%; left: 16%; transform: rotate(6deg); }
  .sf-4 { bottom: 12%; right: 12%; transform: rotate(-10deg); }

  /* ── Keyframes ── */
  @keyframes flip {
    0%   { transform: translateY(-10px) scaleY(0.85); opacity: 0.3; filter: blur(2px); }
    60%  { transform: translateY(2px)   scaleY(1.05); opacity: 1;   filter: blur(0); }
    100% { transform: translateY(0)     scaleY(1);    opacity: 1; }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }
  @keyframes clinkLeft {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    40%, 50% { transform: rotate(18deg) translateY(-4px); }
  }
  @keyframes clinkRight {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    40%, 50% { transform: rotate(-18deg) translateY(-4px); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-12px) rotate(5deg); }
  }

  /* responsive tweaks */
  @media (max-width: 520px) {
    .countdown { gap: 6px; }
    .unit { min-width: 0; padding: 12px 8px; }
    .unit-label { letter-spacing: 0.2em; font-size: 9px; }
    .stag-do { letter-spacing: 0.3em; padding-left: 0.3em; }
    .flourish { width: 56px; height: 56px; }
    .frame { inset: 14px; }
    .flourish.tl, .flourish.tr { top: 18px; }
    .flourish.tl, .flourish.bl { left: 18px; }
    .flourish.tr, .flourish.br { right: 18px; }
    .flourish.bl, .flourish.br { bottom: 18px; }
    .date-pill { padding: 10px 28px; }
    .scattered-beer, .scattered-flag { display: none; }
  }
</style>
</head>
<body>
<div class="poster">

  <!-- ornate gold frame -->
  <div class="frame"></div>

  <!-- corner flourishes (art nouveau scrollwork) -->
  <div class="flourish tl">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish tr">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish bl">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish br">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>

  <!-- scattered atmospheric emojis -->
  <div class="scattered-beer sb-1">🍺</div>
  <div class="scattered-beer sb-2">🍻</div>
  <div class="scattered-beer sb-3">🍻</div>
  <div class="scattered-beer sb-4">🍺</div>
  <div class="scattered-flag sf-1">🇭🇺</div>
  <div class="scattered-flag sf-2">🇭🇺</div>
  <div class="scattered-flag sf-3">🇭🇺</div>
  <div class="scattered-flag sf-4">🇭🇺</div>

  <div class="content">

    <!-- Hungarian flag banner -->
    <div class="flag-banner">
      <span class="flag-emoji">🇭🇺</span>
      <span class="flag-stripe" aria-hidden="true"><span></span><span></span><span></span></span>
      <span class="flag-emoji">🍻</span>
      <span class="flag-stripe" aria-hidden="true"><span></span><span></span><span></span></span>
      <span class="flag-emoji">🇭🇺</span>

    <div class="eyebrow-script">The moment you have been waiting for</div>

    <div class="city">Budapest</div>

    <div class="stag-row">
      <span class="beer left">🍺</span>
      <span class="stag-do">Kilbey's Stag Do</span>
      <span class="beer right">🍺</span>
    </div>

    <div class="ornament">
      <span class="line"></span>
      <span class="diamond">◆</span>
      <span class="diamond gold">◆</span>
      <span class="diamond">◆</span>
      <span class="line"></span>

    <div class="countdown-label">Departing in</div>

    <div class="countdown">
      <div class="unit">
        <div class="unit-num" id="days">00</div>
        <div class="unit-label">Days</div>

      <div class="unit">

    <div class="date-block">
      <div class="date-pill">14 — 17 May 2026</div>
      <div class="date-sub">Wheels up · 05:45</div>

    <div class="tagline">
      Ruin bars <span class="dot">●</span>
      Boat parties <span class="dot">●</span>

      <span class="stamp">No Excuses</span>

  </div>
</div>

<script>
  // Flight departs 05:45 on 14 May 2026
  const target = new Date('2026-05-14T05:45:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  const prev = { days: null, hours: null, mins: null, secs: null };

  function tick(id, val) {
    const el = document.getElementById(id);
    const str = pad(val);
    if (el.textContent !== str) {
      el.textContent = str;
      el.classList.remove('tick');
      void el.offsetWidth; // force reflow
      el.classList.add('tick');
    }
  }

  function update() {
    const now  = new Date();
    const diff = Math.max(0, target - now);

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff %  3600000) /   60000);
    const s = Math.floor((diff %    60000) /    1000);

    tick('days',  d);
    tick('hours', h);
    tick('mins',  m);
    tick('secs',  s);
  }

  update();
  setInterval(update, 1000);
