<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budapest Stag Do — Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,600;0,800;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–gold: #C9A84C;
–gold-light: #F0D080;
–gold-dim: #7A5E1A;
–red: #E63946;
–bg: #07070F;
–navy: #0D0D1A;
–card: #111122;
–white: #F0EDE8;
–muted: #5A5A7A;
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
overflow: hidden;
}

.poster {
width: 100vw; height: 100vh;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
position: relative;
overflow: hidden;
font-family: ‘Barlow Condensed’, sans-serif;
}

/* ── Noise grain overlay ── */
.poster::before {
content: ‘’;
position: absolute; inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.06’/%3E%3C/svg%3E”);
background-size: 200px 200px;
pointer-events: none; z-index: 1;
opacity: 0.4;
}

/* ── Radial gold glow centre ── */
.glow-centre {
position: absolute;
width: 70vmin; height: 70vmin;
border-radius: 50%;
background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
top: 50%; left: 50%;
transform: translate(-50%, -50%);
animation: pulse 4s ease-in-out infinite;
z-index: 0;
}

/* ── Corner decorative lines ── */
.corner { position: absolute; width: 60px; height: 60px; z-index: 2; }
.corner–tl { top: 24px; left: 24px; border-top: 2px solid var(–gold); border-left: 2px solid var(–gold); }
.corner–tr { top: 24px; right: 24px; border-top: 2px solid var(–gold); border-right: 2px solid var(–gold); }
.corner–bl { bottom: 24px; left: 24px; border-bottom: 2px solid var(–gold); border-left: 2px solid var(–gold); }
.corner–br { bottom: 24px; right: 24px; border-bottom: 2px solid var(–gold); border-right: 2px solid var(–gold); }

/* ── Gold horizontal rules ── */
.rule-top, .rule-bottom {
position: absolute; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
z-index: 2;
}
.rule-top { top: 0; }
.rule-bottom { bottom: 0; }

/* ── Content stack ── */
.content {
position: relative; z-index: 3;
display: flex; flex-direction: column;
align-items: center;
gap: 0;
text-align: center;
padding: 0 20px;
width: 100%;
}

/* ── Flag row ── */
.flags {
font-size: clamp(20px, 4vmin, 32px);
letter-spacing: 0.5em;
margin-bottom: 10px;
animation: fadeDown 0.8s ease both;
}

/* ── Eyebrow ── */
.eyebrow {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 300;
font-style: italic;
font-size: clamp(13px, 2.2vmin, 18px);
letter-spacing: 0.4em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 6px;
animation: fadeDown 0.8s 0.1s ease both;
}

/* ── BUDAPEST big title ── */
.city {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(80px, 18vmin, 180px);
color: var(–gold);
line-height: 0.85;
letter-spacing: 0.08em;
text-shadow: 0 0 80px rgba(201,168,76,0.35), 0 0 20px rgba(201,168,76,0.15);
animation: fadeDown 0.8s 0.2s ease both;
}

/* ── STAG DO ── */
.stag-do {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(36px, 7vmin, 72px);
color: var(–white);
letter-spacing: 0.25em;
line-height: 1;
margin-bottom: 18px;
animation: fadeDown 0.8s 0.3s ease both;
}

/* ── Divider ── */
.divider {
width: 180px; height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
margin-bottom: 18px;
animation: scaleIn 0.6s 0.5s ease both;
}

/* ── COUNTDOWN ── */
.countdown-label {
font-weight: 300;
font-style: italic;
font-size: clamp(12px, 2vmin, 16px);
letter-spacing: 0.5em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 8px;
animation: fadeUp 0.8s 0.6s ease both;
}

.countdown {
display: flex;
gap: clamp(12px, 3vmin, 28px);
align-items: flex-start;
margin-bottom: 20px;
animation: fadeUp 0.8s 0.7s ease both;
}

.unit {
display: flex; flex-direction: column; align-items: center;
}

.unit-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(60px, 14vmin, 130px);
line-height: 1;
color: var(–gold-light);
text-shadow: 0 0 40px rgba(240,208,128,0.4);
position: relative;
}

/* animated digit flip */
.unit-num.tick {
animation: flip 0.4s ease;
}

.unit-label {
font-weight: 600;
font-size: clamp(10px, 1.6vmin, 13px);
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
margin-top: -4px;
}

.colon {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(50px, 10vmin, 100px);
color: var(–gold-dim);
line-height: 1;
padding-top: 4px;
animation: blink 1s step-start infinite;
}

/* ── Date pill ── */
.date-pill {
border: 1px solid var(–gold-dim);
padding: 7px 28px;
font-weight: 600;
font-size: clamp(12px, 2vmin, 16px);
letter-spacing: 0.3em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 14px;
animation: fadeUp 0.8s 0.85s ease both;
}

/* ── Tagline ── */
.tagline {
font-weight: 300;
font-style: italic;
font-size: clamp(12px, 2vmin, 16px);
color: var(–muted);
letter-spacing: 0.12em;
animation: fadeUp 0.8s 0.95s ease both;
}
.tagline span {
color: var(–red);
font-style: normal;
font-weight: 600;
}

/* ── Keyframes ── */
@keyframes pulse {
0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
}
@keyframes blink {
0%, 49% { opacity: 1; }
50%, 100% { opacity: 0.2; }
}
@keyframes flip {
0%   { transform: translateY(-8px); opacity: 0.4; }
100% { transform: translateY(0);    opacity: 1; }
}
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-18px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(18px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
from { transform: scaleX(0); opacity: 0; }
to   { transform: scaleX(1); opacity: 1; }
}
</style>

</head>
<body>
<div class="poster">
  <div class="glow-centre"></div>
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="content">
    <div class="flags">🇭🇺 &nbsp; 🇭🇺 &nbsp; 🇭🇺</div>
    <div class="eyebrow">The moment you've been waiting for</div>
    <div class="city">Budapest</div>
    <div class="stag-do">Stag Do</div>
    <div class="divider"></div>
    <div class="countdown-label">Departing in</div>

<script>
  // Flight departs 05:45 on 14 May 2026
  const target = new Date('2026-05-14T05:45:00');

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick(id, val, prev) {
    const el = document.getElementById(id);
    const str = pad(val);
    if (el.textContent !== str) {
      el.textContent = str;
      el.classList.remove('tick');
      void el.offsetWidth; // reflow
      el.classList.add('tick');
    }
  }

  let prevD, prevH, prevM, prevS;

  function update() {
    const now  = new Date();
    const diff = Math.max(0, target - now);

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);

    tick('days',  d, prevD);
    tick('hours', h, prevH);
    tick('mins',  m, prevM);
    tick('secs',  s, prevS);

    prevD = d; prevH = h; prevM = m; prevS = s;
  }

  update();
  setInterval(update, 1000);
</script>

</body>
</html>
